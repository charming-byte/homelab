---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
resources:
  - ./securitypolicy.yaml

patches:
  - patch: |-
      - op: add
        path: /spec/rules/-
        value:
          matches:
            - path:
                type: PathPrefix
                value: /outpost.goauthentik.io
          backendRefs:
            - name: authentik-outpost-proxy
              namespace: security
              port: 9000
    target:
      group: gateway.networking.k8s.io
      version: v1
      kind: HTTPRoute
      name: ${EXT_AUTH_TARGET_NAME:-${APP}}
