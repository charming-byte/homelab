---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/dragonflydb.io/dragonfly_v1alpha1.json
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: dragonfly
spec:
  args:
    - "--cluster_mode=emulated"
    - "--default_lua_flags=allow-undeclared-keys"
    - "--maxmemory=$(MAX_MEMORY)Mi"
    - "--proactor_threads=2"
  env:
    - name: MAX_MEMORY
      valueFrom:
        resourceFieldRef:
          divisor: 1Mi
          resource: limits.memory
  image: ghcr.io/dragonflydb/dragonfly:v1.38.0@sha256:243bf004df5e137d9432c35367d7c86e6d2b5bcb6700be4b6397fcb9306b794b
  replicas: 2
  resources:
    limits:
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 64Mi
