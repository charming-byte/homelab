---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: resticprofile
spec:
  dataFrom:
    - extract:
        key: resticprofile
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: resticprofile-secret
    template:
      data:
        AWS_ACCESS_KEY_ID: {{ .RESTICPROFILE_S3_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: {{ .RESTICPROFILE_S3_SECRET_ACCESS_KEY }}
        backup-key: {{ .RESTICPROFILE_BACKUP_KEY }}
        profiles.yaml: |
          version: "1"

          global:
            scheduler: crontab:-:/resticprofile/crontab

          default:
            repository: s3:{{ .RESTICROFILE_S3_ENDPOINT_URL }}:{{ .RESTICPROFILE_S3_BUCKET }}
            password-file: /run/secrets/backup-key

          backups:
            inherit: default
            initialize: false
            lock: /tmp/resticprofile-services.lock
            force-inactive-lock: true

            backup:
              source:
                - /backups

              schedule: "weekly"
              schedule-permission: user
              schedule-lock-wait: 1h

              send-before:
                - method: HEAD
                  url: {{ .RESTICPROFILE_BACKUP_HC_PING_URL }}/start
              send-after:
                - method: HEAD
                  url: {{ .RESTICPROFILE_BACKUP_HC_PING_URL }}
              send-after-fail:
                - method: HEAD
                  url: {{ .RESTICPROFILE_BACKUP_HC_PING_URL }}/fail

            forget:
              prune: true
              keep-last: 3
              keep-weekly: 6

            check:
              read-data: true

              schedule: "monthly"
              schedule-permission: user

              send-before:
                - method: HEAD
                  url: {{ .RESTICPROFILE_CHECK_HC_PING_URL }}/start
              send-after:
                - method: HEAD
                  url: {{ .RESTICPROFILE_CHECK_HC_PING_URL }}
              send-after-fail:
                - method: HEAD
                  url: {{ .RESTICPROFILE_CHECK_HC_PING_URL }}/fail