---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/values.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app error-pages
  namespace: network
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: error-pages
  values:
    controllers:
      error-pages:
        replicas: 2
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: ghcr.io/tarampampam/error-pages
              tag: 4.0.0@sha256:19989c478e900898cd556befc71bb71c5c0d2eae11678b26b8cac3df0c6805fb
            env:
              TEMPLATE_NAME: connection
              TZ: Europe/Berlin
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 5m
                memory: 16M
              limits:
                memory: 32M
            securityContext:
              runAsNonRoot: true
              runAsUser: 65534
              runAsGroup: 65534
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              seccompProfile:
                type: RuntimeDefault
              capabilities:
                drop: ["ALL"]

    service:
      app:
        controller: error-pages
        ports:
          http:
            port: &port 8080

    route:
      external:
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: envoy-external
            namespace: network
            sectionName: https
        hostnames:
          - &host error.${SECRET_DOMAIN}
        rules:
          - backendRefs:
              - port: *port
      internal:
        annotations:
          gatus.home-operations.com/enabled: "false"
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: envoy-internal
            namespace: network
            sectionName: https
        hostnames:
          - *host
        rules:
          - backendRefs:
              - port: *port
