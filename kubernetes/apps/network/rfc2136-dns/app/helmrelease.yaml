---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rfc2136-dns
spec:
  chartRef:
    kind: OCIRepository
    name: rfc2136-dns
  interval: 1h
  values:
    domainFilters:
      - ${SECRET_DOMAIN}
    env:
      - name: "RFC2136_TSIG_SECRET"
        valueFrom:
          secretKeyRef:
            key: tsig-secret
            name: rfc2136-dns-secret
      - name: "RFC2136_TSIG_KEYNAME"
        valueFrom:
          secretKeyRef:
            key: tsig-keyname
            name: rfc2136-dns-secret
    fullnameOverride: rfc2136-dns
    podAnnotations:
      secret.reloader.stakater.com/reload: rfc2136-dns-secret
    policy: sync
    provider:
      name: rfc2136
      extraArgs:
        ingress-class: envoy
        rfc2136-host: 192.168.178.1
        rfc2136-port: 5302
        rfc2136-zone: k8s.${SECRET_DOMAIN}
        rfc2136-tsig-secret: ${RFC2136_TSIG_SECRET}
        rfc2136-tsig-secret-alg: "hmac-sha256"
        rfc2136-tsig-keyname: ${RFC2136_TSIG_KEYNAME}
        rfc2136-min-ttl: 60s
    rbac:
      additionalPermissions: []
      create: true
    serviceAccount:
      create: true
      name: external-dns
    serviceMonitor:
      enabled: true
    sources:
      - gateway-httproute
      - service
    triggerLoopOnEvent: true
