---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: slskd
spec:
  dataFrom:
    - extract:
        key: slskd
    - extract:
        key: protonvpn
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: slskd-secret
    template:
      data:
        SLSKD_API_KEY_GLUETUN: "{{ .SLSKD_API_KEY_GLUETUN }}"
        SLSKD_API_KEY_HOMEPAGE: "{{ .SLSKD_API_KEY_HOMEPAGE }}"
        SLSKD_API_KEY_LIDARR: "{{ .SLSKD_API_KEY_LIDARR }}"
        SLSKD_SLSK_PASSWORD: "{{ .SLSKD_SLSK_PASSWORD }}"
        SLSKD_SLSK_USERNAME: "{{ .SLSKD_SLSK_USERNAME }}"
        WIREGUARD_ADDRESSES: 10.2.0.2/32
        WIREGUARD_ENDPOINT_IP: "{{ .SLSKD_GLUETUN__WIREGUARD_ENPOINT_IP }}"
        WIREGUARD_ENDPOINT_PORT: "{{ .SLSKD_GLUETUN__WIREGUARD_ENDPOINT_PORT }}"
        WIREGUARD_PRIVATE_KEY: "{{ .SLSKD_GLUETUN__WIREGUARD_PRIVATE_KEY }}"
        WIREGUARD_PUBLIC_KEY: "{{ .SLSKD_GLUETUN__WIREGUARD_PUBLIC_KEY }}"