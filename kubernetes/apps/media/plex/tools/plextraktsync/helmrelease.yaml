---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plextraktsync
spec:
  chartRef:
    kind: OCIRepository
    name: plextraktsync
  interval: 1h
  values:
    controllers:
      plextraktsync:
        type: cronjob
        cronjob:
          schedule: 0 6,18 * * *
          backoffLimit: 0
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 1
          ttlSecondsAfterFinished: 18000
          timeZone: Europe/Berlin
        containers:
          app:
            image:
              repository: ghcr.io/taxel/plextraktsync
              tag: 0.35.7@sha256:d210acddb9e08f34829ac42965db7b3726ed070acd119c25bc8612a08b4bfdc3
            envFrom:
              - secretRef:
                  name: plextraktsync-secret
            env:
              TZ: Europe/Berlin
            args:
              - sync
        pod:
          restartPolicy: Never
    persistence:
      config-file:
        type: secret
        name: plextraktsync-secret
        globalMounts:
          - path: /app/config/config.yml
            subPath: config.yml
      servers-file:
        type: secret
        name: plextraktsync-secret
        globalMounts:
          - path: /app/config/servers.yml
            subPath: servers.yml
      pytrakt-file:
        type: secret
        name: plextraktsync-secret
        globalMounts:
          - path: /app/config/.pytrakt.json
            subPath: .pytrakt.json
