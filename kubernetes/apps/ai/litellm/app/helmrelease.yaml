---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    controllers:
      litellm:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            args:
              - "--config"
              - /app/config.yaml
              - "--host"
              - "0.0.0.0"
              - "--port"
              - "4000"
            env:
              LITELLM_DONT_SHOW_FEEDBACK_BOX: "true"
              LITELLM_MODE: PRODUCTION
              REDIS_HOST: dragonfly.dbms.svc.cluster.local
              STORE_MODEL_IN_DB: true
              TZ: Europe/Berlin
              USE_PRISMA_MIGRATE: "true"
            envFrom: &envFrom
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            image:
              repository: ghcr.io/berriai/litellm
              tag: v1.93.0@sha256:a1745e629abfb17d434426ff48b115f54f4f4c4a0f5af241de569e93c63c411e
            probes:
              liveness:
                custom: true
                enabled: true
                spec:
                  failureThreshold: 3
                  httpGet:
                    path: /health/liveliness
                    port: 4000
                  initialDelaySeconds: 30
                  periodSeconds: 60
                  timeoutSeconds: 10
              readiness:
                custom: true
                enabled: true
                spec:
                  failureThreshold: 3
                  httpGet:
                    path: /health/readiness
                    port: 4000
                  initialDelaySeconds: 15
                  periodSeconds: 5
                  timeoutSeconds: 5
            resources:
              limits:
                memory: 2Gi
              requests:
                cpu: 10m
                memory: 756Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
              readOnlyRootFilesystem: false
        initContainers:
          init-db:
            envFrom: *envFrom
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4.0@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
        runAsGroup: 1000
        runAsUser: 1000
    persistence:
      tmpfs:
        globalMounts:
          - path: /cache
            subPath: cache
          - path: /tmp
            subPath: tmp
          - path: /app/migrations
            subPath: migrations
        type: emptyDir
      config:
        globalMounts:
          - path: /app/config.yaml
            subPath: config.yaml
        name: litellm-configmap
        type: configMap
    route:
      main:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: AI
          gethomepage.dev/name: LiteLLM
          gethomepage.dev/description: "AI Gateway"
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: 80
    service:
      app:
        controller: litellm
        ports:
          http:
            port: 80
            targetPort: 4000
