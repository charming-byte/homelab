---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/toolhive.stacklok.dev/virtualmcpserver_v1alpha1.json
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: VirtualMCPServer
metadata:
  name: mcp-gateway-internal
spec:
  groupRef:
    name: mcp-tools
  telemetryConfigRef:
    name: prometheus
  config:
    aggregation:
      conflictResolution: prefix
      conflictResolutionConfig:
        prefixFormat: "{workload}_"
  incomingAuth:
    type: anonymous
  outgoingAuth:
    source: discovered
  sessionStorage:
    provider: redis
    address: dragonfly.dbms:6379
    keyPrefix: "mcp-gateway-internal:"
  podTemplateSpec:
    spec:
      containers:
        - name: vmcp
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1536Mi
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/toolhive.stacklok.dev/mcpgroup_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPGroup
metadata:
  name: mcp-tools
spec:
  description: Aggregated MCP tools for AI assistants
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/toolhive.stacklok.dev/mcptelemetryconfig_v1alpha1.json
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPTelemetryConfig
metadata:
  name: prometheus
  namespace: ai
spec:
  prometheus:
    enabled: true
