# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich-server
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      immich:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: RollingUpdate
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4.0@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
            envFrom:
              - secretRef:
                  name: immich-secret
          init-extensions:
            dependsOn: init-db
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4.0@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
            env:
              PGHOST: postgres18-vector-rw.dbms.svc.cluster.local
              PGUSER: postgres
              PGPASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-secret
                    key: INIT_POSTGRES_SUPER_PASS
              PGDATABASE: immich
            command: ["/bin/bash", "-c"]
            args:
              - |
                psql -c "CREATE EXTENSION IF NOT EXISTS vchord CASCADE;"
                psql -c "CREATE EXTENSION IF NOT EXISTS cube CASCADE;"
                psql -c "CREATE EXTENSION IF NOT EXISTS earthdistance CASCADE;"
        containers:
          app:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v2.7.5@sha256:c15bff75068effb03f4355997d03dc7e0fc58720c2b54ad6f7f10d1bc57efaa5
            env:
              TZ: Europe/Berlin
              IMMICH_CONFIG_FILE: /etc/immich/config.json
              IMMICH_WORKERS_INCLUDE: api
              IMMICH_METRICS_INCLUDE: all
              IMMICH_HELMET_FILE: true
            envFrom:
              - configMapRef:
                  name: immich-configmap
              - secretRef:
                  name: immich-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /server-info/ping
                    port: &port 2283
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 5
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/server/ping
                    port: *port
                  failureThreshold: 30
                  initialDelaySeconds: 15
                  periodSeconds: 5
                  successThreshold: 1
                  timeoutSeconds: 1
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 150Mi
              limits:
                memory: 500Mi
    defaultPodOptions:
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: immich
        ports:
          http:
            port: *port
          metrics:
            port: 8081
    route:
      app:
        annotations:
          gethomepage.dev/description: Photo and video management solution
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Media
          gethomepage.dev/icon: immich.svg
          gethomepage.dev/name: Immich
          gethomepage.dev/widget.type: immich
          gethomepage.dev/widget.url: http://immich-server.self-hosted.svc.cluster.local:2283
          gethomepage.dev/widget.key: "{{`{{HOMEPAGE_VAR_IMMICH_API_KEY}}`}}"
          gethomepage.dev/widget.version: "2"
        hostnames:
          - "photos.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: http
    persistence:
      library:
        type: nfs
        server: nas.internal
        path: /photos
        globalMounts:
          - path: /usr/src/app/upload
      immich-config:
        enabled: true
        type: secret
        name: immich-secret
        items:
          - key: config.json
            path: config.json
        advancedMounts:
          immich:
            app:
              - path: /etc/immich
                readOnly: true
