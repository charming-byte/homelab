---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: immich-secret
    template:
      data:
        # Database
        DB_HOSTNAME: &dbhost "postgres18-vector-rw.dbms.svc.cluster.local"
        DB_PORT: "5432"
        DB_USERNAME: &dbuser "{{ .IMMICH_POSTGRES_USER }}"
        DB_PASSWORD: &dbpass "{{ .IMMICH_POSTGRES_PASSWORD }}"
        DB_DATABASE_NAME: &dbname "{{ .IMMICH_POSTGRES_DB }}"
        # Postgres Init
        INIT_POSTGRES_DBNAME: *dbname
        INIT_POSTGRES_HOST: *dbhost
        INIT_POSTGRES_USER: *dbuser
        INIT_POSTGRES_PASS: *dbpass
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"

        # Configuration
        config.json: |
          {
          "backup": {
            "database": {
              "enabled": false
            }
          },
          "ffmpeg": {
            "accel": "qsv",
            "accelDecode": true,
            "preset": "slow",
            "targetResolution": "original",
            "transcode": "required"
          },
          "image": {
            "colorspace": "p3",
            "extractEmbedded": false,
            "fullsize": {
              "enabled": false,
              "format": "jpeg",
              "quality": 80
            },
            "preview": {
              "format": "webp",
              "quality": 80,
              "size": 1440
            },
            "thumbnail": {
              "format": "webp",
              "quality": 80,
              "size": 250
            }
          },
          "library": {
            "scan": {
              "cronExpression": "0 0 * * *",
              "enabled": true
            },
            "watch": {
              "enabled": false
            }
          },
          "metadata": {
            "faces": {
              "import": true
            }
          },
          "nightlyTasks": {
            "clusterNewFaces": true,
            "databaseCleanup": true,
            "generateMemories": true,
            "missingThumbnails": true,
            "startTime": "00:00",
            "syncQuotaUsage": true
          },
          "notifications": {
            "smtp": {
              "enabled": true,
              "from": "Immich <noreply@mail.{{ .SECRET_DOMAIN }}>",
              "transport": {
                "host": "smtp.{{ .SECRET_DOMAIN }}",
                "ignoreCert": true,
                "port": 25,
                "secure": false
              }
            }
          },
          "oauth": {
            "autoLaunch": true,
            "autoRegister": true,
            "buttonText": "Login with ${SECRET_DOMAIN}",
            "clientId": "{{ .IMMICH_OAUTH_CLIENT_ID }}",
            "clientSecret": "{{ .IMMICH_OAUTH_CLIENT_SECRET }}",
            "defaultStorageQuota": 0,
            "enabled": true,
            "issuerUrl": "{{ .IMMICH_OAUTH_ISSUER_URL }}",
          },
          "passwordLogin": {
            "enabled": false
          },
          "storageTemplate": {
            "enabled": true,
            "hashVerificationEnabled": true,
            "template": "{{ `{{y}}/{{y}}-{{MM}}-{{dd}}/{{filename}}` }}"
          },
  dataFrom:
  - extract:
      key: postgres
  - extract:
      key: immich
  - extract:
      key: domain