---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitea-runner
spec:
  chartRef:
    kind: OCIRepository
    name: gitea-runner
  install:
    remediation:
      retries: 3
  interval: 30m
  maxHistory: 3
  uninstall:
    keepHistory: false
  upgrade:
    remediation:
      retries: 3
  values:
    controllers:
      runner:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            env:
              ACT_CACHE_SERVER_DIR: /cache/server
              DOCKER_CERT_PATH: /certs/client
              DOCKER_HOST: tcp://localhost:2376
              DOCKER_TLS_VERIFY: 1
              GITEA_INSTANCE_URL: http://gitea.self-hosted.svc.cluster.local
              GITEA_RUNNER_ACTION_CACHE_DIR: /cache/actions
              GITEA_RUNNER_JOB_CONTAINER_NETWORK: host
              GITEA_RUNNER_JOB_CONTAINER_PRIVILEGED: "true"
              TZ: Europe/Berlin
            envFrom:
              - secretRef:
                  name: gitea-runner-secret
            image:
              pullPolicy: Always
              repository: docker.io/gitea/act_runner
              tag: 0.3@sha256:c2a169c5e99864c25e32527cef3d82203225e09558773022bf3dc164a2e6d762
            restartPolicy: Always
            securityContext:
              appArmorProfile:
                type: Unconfined
              privileged: true
              seccompProfile:
                type: Unconfined
        initContainers:
          daemon:
            env:
              DOCKER_TLS_CERTDIR: /certs
            image:
              pullPolicy: IfNotPresent
              repository: docker.io/docker
              tag: 29.4.0-dind@sha256:f80c26212befc1c1988b529495532c6b9180d9b1dab1611f4a1efbe9da8ec821
              TZ: Europe/Berlin
            restartPolicy: Always
            securityContext:
              privileged: true
        pod:
          securityContext:
            seccompProfile:
              type: Unconfined
        replicas: 3
        type: statefulset
    persistence:
      cache:
        advancedMounts:
          runner:
            app:
              - path: /cache
        enabled: true
        type: emptyDir
      data:
        accessMode: ReadWriteOnce
        advancedMounts:
          runner:
            app:
              - path: /data
        enabled: true
        size: 5Gi
        storageClass: local-hostpath
        type: persistentVolumeClaim
      docker-certs:
        enabled: true
        globalMounts:
          - path: /certs
        type: emptyDir
    service:
      main:
        enabled: false
