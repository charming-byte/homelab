---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mealie
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: -1
  interval: 1h
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      mealie:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            env:
              ALLOW_PASSWORD_LOGIN: "false"
              ALLOW_SIGNUP: "false"
              API_PORT: 9000
              API_DOCS: "false"
              BASE_URL: https://mealie.${SECRET_DOMAIN}
              DB_ENGINE: postgres
              OIDC_ADMIN_GROUP: "mealie Admins"
              OIDC_AUTH_ENABLED: "true"
              OIDC_AUTO_REDIRECT: "true"
              OIDC_PROVIDER_NAME: ${SECRET_DOMAIN}
              OIDC_REMEMBER_ME: "true"
              OIDC_SIGNUP_ENABLED: "true"
              OIDC_USER_GROUP: "mealie Users"
              SMTP_HOST: smtp.${SECRET_DOMAIN}
              SMTP_PORT: 25
              SMTP_AUTH_STRATEGY: NONE
              SMTP_FROM_EMAIL: "noreply@mail.${SECRET_DOMAIN}"
              TZ: Europe/Berlin
            envFrom:
              - secretRef:
                  name: mealie-secret
            image:
              repository: ghcr.io/mealie-recipes/mealie
              tag: v3.20.1@sha256:9b680f5dad8618e69317a005e083a00a699845fb2a72c392a558a4e2898aed20
            probes:
              liveness: &probes
                custom: true
                enabled: true
                spec:
                  httpGet:
                    path: /api/app/about
                    port: 9000
              readiness: *probes
            resources:
              limits:
                memory: 512Mi
              requests:
                cpu: 25m
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
              readOnlyRootFilesystem: true
        initContainers:
          init-db:
            envFrom:
              - secretRef:
                  name: mealie-secret
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4.0@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
        pod:
          securityContext:
            fsGroup: 911
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 911
            runAsNonRoot: true
            runAsUser: 911
    persistence:
      data:
        advancedMounts:
          mealie:
            app:
              - path: /app/data
        size: 8Gi
        storageClass: local-hostpath
        accessMode: ReadWriteOnce
    route:
      mealie:
        annotations:
          gethomepage.dev/description: Recipe Manager and Meal Planner
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Self-hosted
          gethomepage.dev/icon: mealie.svg
          gethomepage.dev/name: Mealie
        hostnames:
          - mealie.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: mealie
                port: 9000
            matches:
              - path:
                  type: PathPrefix
                  value: /
    service:
      mealie:
        controller: mealie
        ports:
          http:
            port: 9000